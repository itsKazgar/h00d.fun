<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>h00d.fun</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0d0d0d; min-height: 100vh; font-family: 'VT323', monospace; }
    #p1 { min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    #enter-word { font-size: 28px; letter-spacing: 8px; color: #33ff33; cursor: pointer; }
    #enter-word:hover { color: #fff; }
    .cur-thin { display: inline-block; width: 2px; height: 18px; background: #33ff33; animation: bl 1s step-end infinite; vertical-align: middle; margin-left: 2px; }
    @keyframes bl { 0%,100%{opacity:1} 50%{opacity:0} }
    #p2 { display: none; min-height: 100vh; padding: 2.5rem 3rem; flex-direction: column; gap: 1.5rem; }
    #msg { -webkit-appearance: none; appearance: none; background: #0d0d0d !important; border: none !important; outline: none !important; box-shadow: none !important; -webkit-text-fill-color: #ffffff !important; color: #ffffff !important; font-family: 'VT323', monospace !important; font-size: 22px !important; resize: none; width: 100%; line-height: 1.5; letter-spacing: 1px; caret-color: #33ff33; border-radius: 0; padding: 0; }
    #msg::placeholder { color: #333 !important; -webkit-text-fill-color: #333 !important; }
    #who { -webkit-appearance: none; appearance: none; background: #0d0d0d !important; border: none !important; outline: none !important; box-shadow: none !important; -webkit-text-fill-color: #ffffff !important; color: #ffffff !important; font-family: 'VT323', monospace !important; font-size: 16px !important; caret-color: #33ff33; border-radius: 0; padding: 0; flex: 1; letter-spacing: 1px; }
    #who::placeholder { color: #333 !important; -webkit-text-fill-color: #333 !important; }
    .name-row { display: flex; align-items: center; gap: 10px; }
    .name-row span { font-size: 16px; color: #33ff33; }
    .post-btn { background: #0d0d0d; border: none; font-family: 'VT323', monospace; font-size: 18px; color: #33ff33; cursor: pointer; letter-spacing: 2px; }
    .post-btn:hover { color: #fff; }
    .feed-wrap { border-top: 1px solid #1a1a1a; padding-top: 1.5rem; display: flex; flex-direction: column; gap: 1.25rem; }
    .p-meta { font-size: 14px; color: #333; }
    .p-meta .who { color: #33ff33; }
    .p-body { font-size: 20px; color: #ccc; line-height: 1.5; white-space: pre-wrap; word-break: break-word; }
  </style>
</head>
<body>
  <div id="p1">
    <span id="enter-word" onclick="goIn()"></span><span class="cur-thin"></span>
  </div>
  <div id="p2">
    <textarea id="msg" rows="3" placeholder="say something..."></textarea>
    <div class="name-row">
      <span>~</span>
      <input id="who" type="text" placeholder="anon" maxlength="28" />
      <button class="post-btn" onclick="doPost()">[ post ]</button>
    </div>
    <div class="feed-wrap" id="feed"></div>
  </div>
  <script>
    const posts = [];
    const word = 'ENTER';
    let i = 0;
    function typeIt() {
      const el = document.getElementById('enter-word');
      if (i <= word.length) { el.textContent = word.slice(0, i); i++; setTimeout(typeIt, 120); }
    }
    setTimeout(typeIt, 300);
    document.addEventListener('keydown', e => {
      const onP1 = document.getElementById('p1').style.display !== 'none';
      if (onP1 && e.key === 'Enter') goIn();
      if (!onP1 && e.key === 'Enter' && e.ctrlKey) { e.preventDefault(); doPost(); }
    });
    function goIn() {
      document.getElementById('p1').style.display = 'none';
      const p2 = document.getElementById('p2');
      p2.style.display = 'flex';
      setTimeout(() => { const t = document.getElementById('msg'); t.style.cssText += '-webkit-text-fill-color: #ffffff !important; color: #ffffff !important;'; t.focus(); }, 50);
    }
    function doPost() {
      const text = document.getElementById('msg').value.trim();
      if (!text) return;
      const who = document.getElementById('who').value.trim() || 'anon';
      const now = new Date().toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' });
      posts.unshift({ who, text, now });
      document.getElementById('msg').value = '';
      render();
    }
    function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
    function render() {
      document.getElementById('feed').innerHTML = posts.map(p => `<div><div class="p-meta"><span class="who">${esc(p.who)}</span> · ${esc(p.now)}</div><div class="p-body">${esc(p.text)}</div></div>`).join('');
    }
  </script>
</body>
</html>
