<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>h00d.fun</title>
  <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0d0d0d; min-height: 100vh; font-family: 'VT323', monospace; color: #33ff33; }
    .page { display: none; min-height: 100vh; }
    .page.active { display: flex; }
    #p1 { align-items: center; justify-content: center; }
    #enter-word { font-size: 28px; letter-spacing: 8px; color: #33ff33; cursor: pointer; }
    #enter-word:hover { color: #fff; }
    .cur-thin { display: inline-block; width: 2px; height: 18px; background: #33ff33; animation: bl 1s step-end infinite; vertical-align: middle; margin-left: 2px; }
    @keyframes bl { 0%,100%{opacity:1} 50%{opacity:0} }
    #p2 { flex-direction: column; align-items: center; justify-content: center; gap: 1.2rem; padding: 2rem; }
    .field-label { font-size: 13px; color: #444; letter-spacing: 3px; margin-bottom: 4px; }
    .err { font-size: 14px; color: #ff4444; letter-spacing: 1px; min-height: 18px; }
    .auth-toggle { font-size: 14px; color: #333; letter-spacing: 2px; }
    .auth-toggle span { color: #33ff33; cursor: pointer; }
    .auth-toggle span:hover { color: #fff; }
    .wallet-hint { font-size: 13px; color: #333; letter-spacing: 1px; margin-top: 6px; }
    #p3 { flex-direction: column; padding: 2.5rem 3rem; gap: 1.5rem; }
    .topbar { display: flex; align-items: center; justify-content: space-between; }
    .topbar-user { font-size: 16px; color: #33ff33; letter-spacing: 2px; }
    .logout-btn { background: none; border: none; font-family: 'VT323', monospace; font-size: 14px; color: #333; cursor: pointer; letter-spacing: 2px; }
    .logout-btn:hover { color: #ff4444; }
    .feed-wrap { border-top: 1px solid #1a1a1a; padding-top: 1.5rem; display: flex; flex-direction: column; gap: 1.25rem; }
    .p-meta { font-size: 14px; color: #333; display: flex; align-items: center; gap: 8px; }
    .p-meta .who { color: #33ff33; }
    .p-body { font-size: 20px; color: #ccc; line-height: 1.5; white-space: pre-wrap; word-break: break-word; }
    .loading { font-size: 16px; color: #333; letter-spacing: 2px; }
    .bag-btn { background: none; border: none; cursor: pointer; padding: 0; opacity: 0.4; transition: opacity 0.15s, transform 0.15s; display: inline-flex; align-items: center; vertical-align: middle; }
    .bag-btn:hover { opacity: 1; transform: scale(1.15); }
    #sol-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.88); align-items: center; justify-content: center; z-index: 100; }
    #sol-modal.open { display: flex; }
    .sol-box { background: #0d0d0d; border: 1px solid #1e3a1e; padding: 2rem 2.5rem; display: flex; flex-direction: column; gap: 1rem; min-width: 280px; }
    .sol-box-title { font-size: 18px; color: #33ff33; letter-spacing: 3px; }
    .sol-to { font-size: 14px; color: #444; letter-spacing: 1px; }
    .sol-to span { color: #33ff33; }
    .sol-addr { font-size: 11px; color: #222; letter-spacing: 1px; word-break: break-all; margin-top: -6px; }
    .sol-err { font-size: 13px; color: #ff4444; min-height: 16px; }
    .sol-success { font-size: 13px; color: #33ff33; min-height: 16px; }
    .sol-close { font-size: 13px; color: #333; cursor: pointer; letter-spacing: 2px; }
    .sol-close:hover { color: #ff4444; }
    input[type=text], input[type=password], input[type=number], textarea {
      -webkit-appearance: none; appearance: none;
      background: #0d0d0d !important; border: none !important; outline: none !important;
      box-shadow: none !important; border-radius: 0; padding: 0; margin: 0;
      font-family: 'VT323', monospace !important; caret-color: #33ff33;
      -webkit-text-fill-color: #ffffff !important; color: #ffffff !important;
    }
    input[type=text], input[type=password] { font-size: 18px !important; letter-spacing: 2px; width: 260px; border-bottom: 1px solid #1e1e1e !important; padding-bottom: 4px !important; }
    input[type=number] { font-size: 18px !important; letter-spacing: 2px; width: 160px; border-bottom: 1px solid #1e1e1e !important; padding-bottom: 4px !important; }
    input::placeholder { color: #2a2a2a !important; -webkit-text-fill-color: #2a2a2a !important; }
    textarea#msg { font-size: 20px !important; resize: none; width: 100%; line-height: 1.5; letter-spacing: 1px; }
    textarea#msg::placeholder { color: #2a2a2a !important; -webkit-text-fill-color: #2a2a2a !important; }
    button.action { background: none; border: none; font-family: 'VT323', monospace; font-size: 18px; color: #33ff33; cursor: pointer; letter-spacing: 3px; }
    button.action:hover { color: #fff; }
  </style>
</head>
<body>

<div class="page active" id="p1">
  <span id="enter-word" onclick="showAuth()"></span><span class="cur-thin"></span>
</div>

<div class="page" id="p2">
  <div>
    <div class="field-label">USERNAME</div>
    <input type="text" id="auth-user" placeholder="your name" maxlength="24" autocomplete="off" />
  </div>
  <div>
    <div class="field-label">PASSWORD</div>
    <input type="password" id="auth-pass" placeholder="••••••••" maxlength="64" />
  </div>
  <div id="wallet-field" style="display:none">
    <div class="field-label">SOLANA WALLET <span style="color:#333;font-size:11px;letter-spacing:1px;">optional</span></div>
    <input type="text" id="auth-wallet" placeholder="your public key" maxlength="44" autocomplete="off" spellcheck="false" />
    <div class="wallet-hint">so others can send you SOL</div>
  </div>
  <div class="err" id="auth-err"></div>
  <button class="action" id="auth-btn" onclick="submitAuth()">[ enter ]</button>
  <div class="auth-toggle" id="auth-toggle">no account? <span onclick="toggleMode()">register</span></div>
</div>

<div class="page" id="p3">
  <div class="topbar">
    <div class="topbar-user" id="topbar-user"></div>
    <button class="logout-btn" onclick="logout()">[ logout ]</button>
  </div>
  <textarea id="msg" rows="3" placeholder="say something..."></textarea>
  <button class="action" onclick="doPost()">[ post ]</button>
  <div class="feed-wrap" id="feed"><div class="loading">loading...</div></div>
</div>

<div id="sol-modal">
  <div class="sol-box">
    <div class="sol-box-title">send sol</div>
    <div class="sol-to">to: <span id="sol-to-name"></span></div>
    <div class="sol-addr" id="sol-to-addr"></div>
    <div>
      <div class="field-label">AMOUNT (SOL)</div>
      <input type="number" id="sol-amount" placeholder="0.01" min="0.001" step="0.001" />
    </div>
    <div class="sol-err" id="sol-err"></div>
    <div class="sol-success" id="sol-success"></div>
    <button class="action" onclick="sendSol()">[ send ]</button>
    <span class="sol-close" onclick="closeModal()">← cancel</span>
  </div>
</div>

<script>
  const BAG_SVG = `<svg width="18" height="20" viewBox="0 0 120 170" fill="none" xmlns="http://www.w3.org/2000/svg" style="display:block">
    <path stroke="#33ff33" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"
      d="M60 30
         C52 30 44 26 44 20
         C44 14 50 10 58 12
         C54 6 56 0 62 0
         C68 0 72 4 72 10
         C72 8 76 6 80 8
         C86 10 86 18 80 22
         C78 24 74 26 70 28
         C68 30 64 30 60 30 Z"/>
    <path stroke="#33ff33" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" fill="none"
      d="M48 30 C44 36 42 42 42 48 M72 30 C76 36 78 42 78 48"/>
    <path stroke="#33ff33" stroke-width="6" stroke-linecap="round" fill="none"
      d="M42 48 Q60 56 78 48"/>
    <path stroke="#33ff33" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" fill="none"
      d="M42 48 C14 56 10 90 10 100 C10 140 34 160 60 160 C86 160 110 140 110 100 C110 90 106 56 78 48"/>
    <text x="60" y="124" font-family="'VT323',monospace" font-size="68" fill="#33ff33" text-anchor="middle" stroke="none">$</text>
  </svg>`;

  const SB_URL = 'https://vbkeiyrrujxmavvhtbve.supabase.co';
  const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZia2VpeXJydWp4bWF2dmh0YnZlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODExOTgwNDgsImV4cCI6MjA5Njc3NDA0OH0.eZUC4X-p8qFRT-Ga_xAxAWaOH5WQexEXgtJGul242Fo';

  let currentUser = localStorage.getItem('h00d_user') || null;
  let currentWallet = localStorage.getItem('h00d_wallet') || null;
  let isRegister = false;

  const word = 'ENTER';
  let ti = 0;
  function typeIt() {
    const el = document.getElementById('enter-word');
    if (ti <= word.length) { el.textContent = word.slice(0, ti); ti++; setTimeout(typeIt, 120); }
  }
  setTimeout(typeIt, 300);

  document.addEventListener('keydown', e => {
    if (document.getElementById('p1').classList.contains('active') && e.key === 'Enter') showAuth();
    if (document.getElementById('p2').classList.contains('active') && e.key === 'Enter') submitAuth();
    if (document.getElementById('p3').classList.contains('active') && e.key === 'Enter' && e.ctrlKey) { e.preventDefault(); doPost(); }
  });

  function show(id) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }

  function showAuth() {
    if (currentUser) { showFeed(); return; }
    show('p2');
    setTimeout(() => document.getElementById('auth-user').focus(), 50);
  }

  function toggleMode() {
    isRegister = !isRegister;
    document.getElementById('auth-btn').textContent = isRegister ? '[ create ]' : '[ enter ]';
    document.getElementById('auth-toggle').innerHTML = isRegister
      ? 'have an account? <span onclick="toggleMode()">login</span>'
      : 'no account? <span onclick="toggleMode()">register</span>';
    document.getElementById('wallet-field').style.display = isRegister ? 'block' : 'none';
    document.getElementById('auth-err').textContent = '';
  }

  async function sbFetch(path, opts = {}) {
    const res = await fetch(SB_URL + path, {
      ...opts,
      headers: {
        'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY,
        'Content-Type': 'application/json', 'Prefer': 'return=representation',
        ...(opts.headers || {})
      }
    });
    const data = await res.json();
    return { ok: res.ok, data };
  }

  async function submitAuth() {
    const username = document.getElementById('auth-user').value.trim().toLowerCase();
    const password = document.getElementById('auth-pass').value;
    const wallet   = document.getElementById('auth-wallet').value.trim();
    const err = document.getElementById('auth-err');
    err.textContent = '';
    if (!username || !password) { err.textContent = 'fill in both fields'; return; }
    if (isRegister) {
      if (wallet && !/^[1-9A-HJ-NP-Za-km-z]{32,44}$/.test(wallet)) { err.textContent = 'wallet address looks wrong'; return; }
      const check = await sbFetch('/rest/v1/users?username=eq.' + encodeURIComponent(username) + '&select=username');
      if (check.data && check.data.length > 0) { err.textContent = 'username taken'; return; }
      const body = { username, password };
      if (wallet) body.wallet = wallet;
      const res = await sbFetch('/rest/v1/users', { method: 'POST', body: JSON.stringify(body) });
      if (!res.ok) { err.textContent = 'error creating account'; return; }
      if (wallet) localStorage.setItem('h00d_wallet', wallet);
    } else {
      const res = await sbFetch('/rest/v1/users?username=eq.' + encodeURIComponent(username) + '&password=eq.' + encodeURIComponent(password) + '&select=username,wallet');
      if (!res.data || res.data.length === 0) { err.textContent = 'wrong username or password'; return; }
      const w = res.data[0].wallet;
      if (w) localStorage.setItem('h00d_wallet', w); else localStorage.removeItem('h00d_wallet');
      currentWallet = w || null;
    }
    currentUser = username;
    localStorage.setItem('h00d_user', username);
    showFeed();
  }

  function showFeed() {
    document.getElementById('topbar-user').textContent = '~ ' + currentUser;
    show('p3');
    setTimeout(() => {
      const t = document.getElementById('msg');
      t.style.cssText += '-webkit-text-fill-color:#ffffff!important;color:#ffffff!important;';
      t.focus();
    }, 50);
    loadPosts();
  }

  async function loadPosts() {
    const res = await sbFetch('/rest/v1/posts?select=username,body,created_at&order=created_at.desc&limit=100');
    if (!res.ok) { document.getElementById('feed').innerHTML = '<div class="loading">error loading posts</div>'; return; }
    render(res.data);
  }

  async function doPost() {
    const text = document.getElementById('msg').value.trim();
    if (!text) return;
    await sbFetch('/rest/v1/posts', { method: 'POST', body: JSON.stringify({ username: currentUser, body: text }) });
    document.getElementById('msg').value = '';
    loadPosts();
  }

  function logout() {
    currentUser = null; currentWallet = null;
    localStorage.removeItem('h00d_user'); localStorage.removeItem('h00d_wallet');
    show('p1');
  }

  function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  function timeAgo(ts) {
    const diff = Math.floor((Date.now() - new Date(ts)) / 1000);
    if (diff < 60) return 'just now';
    if (diff < 3600) return Math.floor(diff/60) + 'm ago';
    if (diff < 86400) return Math.floor(diff/3600) + 'h ago';
    return Math.floor(diff/86400) + 'd ago';
  }

  const walletCache = {};
  async function getWallet(username) {
    if (walletCache[username] !== undefined) return walletCache[username];
    const res = await sbFetch('/rest/v1/users?username=eq.' + encodeURIComponent(username) + '&select=wallet');
    const w = (res.data && res.data[0] && res.data[0].wallet) || null;
    walletCache[username] = w;
    return w;
  }

  async function render(posts) {
    if (!posts || posts.length === 0) {
      document.getElementById('feed').innerHTML = '<div class="loading">no posts yet. be first.</div>'; return;
    }
    document.getElementById('feed').innerHTML = posts.map((p, i) => `
      <div id="post-${i}">
        <div class="p-meta">
          <span class="who">${esc(p.username)}</span>
          <span style="color:#2a2a2a">·</span>
          <span>${timeAgo(p.created_at)}</span>
          ${p.username !== currentUser ? `<span id="sol-btn-${i}"></span>` : ''}
        </div>
        <div class="p-body">${esc(p.body)}</div>
      </div>
    `).join('');

    posts.forEach(async (p, i) => {
      if (p.username === currentUser) return;
      const w = await getWallet(p.username);
      if (!w) return;
      const el = document.getElementById('sol-btn-' + i);
      if (el) el.innerHTML = `<button class="bag-btn" title="send SOL to @${esc(p.username)}" onclick="openModal('${esc(p.username)}','${w}')">${BAG_SVG}</button>`;
    });
  }

  let _solTo = null;

  function openModal(username, wallet) {
    _solTo = { username, wallet };
    document.getElementById('sol-to-name').textContent = '@' + username;
    document.getElementById('sol-to-addr').textContent = wallet;
    document.getElementById('sol-amount').value = '';
    document.getElementById('sol-err').textContent = '';
    document.getElementById('sol-success').textContent = '';
    document.getElementById('sol-modal').classList.add('open');
  }

  function closeModal() {
    document.getElementById('sol-modal').classList.remove('open');
    _solTo = null;
  }

  async function sendSol() {
    const err = document.getElementById('sol-err');
    const suc = document.getElementById('sol-success');
    err.textContent = ''; suc.textContent = '';
    const amount = parseFloat(document.getElementById('sol-amount').value);
    if (!amount || amount <= 0) { err.textContent = 'enter an amount'; return; }
    if (!_solTo) return;
    const provider = window.solana || window.phantom?.solana;
    if (!provider || !provider.isPhantom) { err.textContent = 'phantom not found — install phantom.app'; return; }
    try {
      await provider.connect();
      const { Connection, PublicKey, Transaction, SystemProgram, LAMPORTS_PER_SOL, clusterApiUrl } =
        await import('https://cdn.jsdelivr.net/npm/@solana/web3.js@1.98.0/lib/index.browser.esm.js');
      const connection = new Connection(clusterApiUrl('mainnet-beta'), 'confirmed');
      const fromPubkey = provider.publicKey;
      const toPubkey   = new PublicKey(_solTo.wallet);
      const lamports   = Math.round(amount * LAMPORTS_PER_SOL);
      const tx = new Transaction().add(SystemProgram.transfer({ fromPubkey, toPubkey, lamports }));
      const { blockhash } = await connection.getLatestBlockhash();
      tx.recentBlockhash = blockhash;
      tx.feePayer = fromPubkey;
      const signed = await provider.signTransaction(tx);
      const sig    = await connection.sendRawTransaction(signed.serialize());
      await connection.confirmTransaction(sig, 'confirmed');
      suc.textContent = '✓ sent! tx: ' + sig.slice(0, 12) + '…';
      await sbFetch('/rest/v1/posts', {
        method: 'POST',
        body: JSON.stringify({ username: currentUser, body: `⬡ sent ${amount} SOL to @${_solTo.username}` })
      });
      setTimeout(() => { closeModal(); loadPosts(); }, 1800);
    } catch(e) {
      err.textContent = e.message || 'transaction failed';
    }
  }

  if (currentUser) showFeed();
</script>
</body>
</html>
