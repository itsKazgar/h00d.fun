<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>BR0THER-H00D</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body {
  background: #000;
  color: #00ffff;
  font-family: 'Courier New', monospace;
  font-size: clamp(12px, 3.5vw, 15px);
  min-height: 100vh;
  min-height: 100dvh;
  overflow-x: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
}
#app {
  width: 100%;
  max-width: 520px;
  padding: clamp(12px, 4vw, 24px);
  box-sizing: border-box;
}
.box {
  border: 1px solid #00ffff;
  padding: clamp(12px, 4vw, 20px);
  width: 100%;
  box-sizing: border-box;
  margin-bottom: 12px;
}
.box-title {
  color: #00ffff;
  font-size: clamp(14px, 5vw, 20px);
  font-weight: bold;
  letter-spacing: 3px;
  border-bottom: 1px solid #333;
  padding-bottom: 10px;
  margin-bottom: 10px;
}
.box-sub { color: #555; font-size: clamp(10px, 3vw, 13px); margin-bottom: 12px; }
.box-sep { border-top: 1px solid #222; margin: 8px 0; }
.box-opt { font-size: clamp(11px, 3.5vw, 14px); padding: 4px 0; }
.cy { color: #00ffff; }
.gr { color: #00ff88; }
.yl { color: #ffff00; }
.mg { color: #ff00ff; }
.rd { color: #ff4444; }
.dm { color: #555; }
#menu-input-row { display: flex; align-items: center; margin-top: 10px; font-size: clamp(11px, 3.5vw, 15px); }
#menu-input-row span { color: #00ffff; white-space: nowrap; }
#menu-key {
  background: transparent; border: none; outline: none;
  color: #00ffff; font-family: 'Courier New', monospace;
  font-size: clamp(12px, 3.5vw, 15px); width: 50px; caret-color: #00ffff;
}
#status { margin-top: 10px; font-size: clamp(10px, 3vw, 13px); color: #555; word-break: break-word; }
#terminal { display: none; }
#term-out { line-height: 1.6; font-size: clamp(11px, 3vw, 14px); overflow-x: hidden; }
#term-out div { white-space: pre-wrap; word-break: break-word; }
#term-input { display: flex; align-items: center; margin-top: 6px; font-size: clamp(11px, 3vw, 14px); }
#term-input span { color: #00ffff; white-space: nowrap; }
#tcmd {
  background: transparent; border: none; outline: none;
  color: #00ffff; font-family: 'Courier New', monospace;
  font-size: clamp(12px, 3.5vw, 15px); flex: 1; caret-color: #00ffff; min-width: 0;
}
</style>
</head>
<body>
<div id="app">

<div id="entry">
  <div class="box">
    <div class="box-title">BR0THER-H00D</div>
    <div class="box-sub">holders only. verify your $H00D below.</div>
    <div class="box-sep"></div>
    <div class="box-opt gr">[1]  Connect Phantom — verify $H00D</div>
    <div class="box-opt cy">[2]  Buy $H00D on pump.fun</div>
  </div>
  <div id="menu-input-row">
    <span>Select (1-2):&nbsp;</span>
    <input id="menu-key" type="text" autofocus autocomplete="off" spellcheck="false">
  </div>
  <div id="status"></div>
</div>

<div id="terminal">
  <div id="term-out"></div>
  <div id="term-input">
    <span>you ›&nbsp;</span>
    <input id="tcmd" type="text" autocomplete="off" spellcheck="false" onkeydown="termKey(event)">
  </div>
</div>

</div>
<script>
const API = window.location.origin;
let wallet = null, hoodBal = 0, hoodMint = null, minBal = 100000;

document.getElementById('menu-key').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const v = this.value.trim(); this.value = '';
    if (v === '1') connectWallet();
    else if (v === '2') openBuy();
  }
});

function setStatus(msg, color) {
  const el = document.getElementById('status');
  el.style.color = color || '#555';
  el.textContent = msg;
}

async function loadConfig() {
  try {
    const d = await (await fetch(`${API}/gate/config`)).json();
    hoodMint = d.mint; minBal = d.min_balance || 100000;
  } catch(e) {}
}

async function connectWallet() {
  if (!window.solana?.isPhantom) { setStatus('Phantom not found — install at phantom.app', '#ff4444'); return; }
  try {
    setStatus('connecting...', '#ffff00');
    const resp = await window.solana.connect();
    wallet = resp.publicKey.toString();
    setStatus(`checking $H00D for ${wallet.slice(0,6)}...${wallet.slice(-4)}`, '#ffff00');
    const r = await fetch(`${API}/gate/check`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({wallet}) });
    const gate = await r.json();
    hoodBal = gate.balance || 0;
    if (gate.access) {
      setStatus(`✓ ${hoodBal.toLocaleString()} $H00D confirmed — entering...`, '#00ff88');
      setTimeout(enterTerminal, 700);
    } else {
      setStatus(`✗ you have ${hoodBal.toLocaleString()} $H00D — need ${minBal.toLocaleString()} — press 2 to buy`, '#ff4444');
    }
  } catch(e) { setStatus('error: ' + e.message, '#ff4444'); }
}

function openBuy() {
  window.open(hoodMint ? `https://pump.fun/coin/${hoodMint}` : 'https://pump.fun', '_blank');
}

function enterTerminal() {
  document.getElementById('entry').style.display = 'none';
  document.getElementById('terminal').style.display = 'block';
  document.getElementById('tcmd').focus();
  tp('gr', '✓ access granted');
  tp('dm', `${wallet.slice(0,6)}...${wallet.slice(-4)}  ${hoodBal.toLocaleString()} $H00D`);
  tp('dm', 'type help for commands');
}

function tp(col, text) {
  const colors = {cy:'#00ffff',gr:'#00ff88',yl:'#ffff00',mg:'#ff00ff',rd:'#ff4444',dm:'#555'};
  const d = document.getElementById('term-out');
  const s = document.createElement('div');
  s.style.color = colors[col] || '#00ffff';
  s.textContent = text;
  d.appendChild(s);
  window.scrollTo(0, document.body.scrollHeight);
}

function termKey(e) {
  if (e.key !== 'Enter') return;
  const cmd = document.getElementById('tcmd').value.trim();
  document.getElementById('tcmd').value = '';
  if (!cmd) return;
  tp('cy', `you › ${cmd}`);
  runCmd(cmd);
}

async function runCmd(raw) {
  const c = raw.toLowerCase().trim();
  if (c === 'help') {
    tp('dm', '──────────────────────');
    tp('gr', '[1] status   — portfolio');
    tp('cy', '[2] market   — prices');
    tp('cy', '[3] trending — coingecko');
    tp('cy', '[4] pump     — pump.fun');
    tp('mg', '[5] trades   — history');
    tp('cy', '[6] wallet   — SOL balance');
    tp('yl', '[7] hood     — $H00D balance');
    tp('mg', '[8] pro      — PRO mode');
    tp('dm', '[c] clear  [0] exit');
    tp('dm', '──────────────────────');
    return;
  }
  if (c==='clear'||c==='c') { document.getElementById('term-out').innerHTML=''; return; }
  if (c==='exit'||c==='0') { tp('dm','disconnecting...'); setTimeout(()=>window.close(),700); return; }
  if (c==='hood'||c==='7') { tp('yl', `${wallet.slice(0,6)}...${wallet.slice(-4)}  ${hoodBal.toLocaleString()} $H00D`); return; }
  if (c==='pro'||c==='8') {
    if (hoodBal>=1000000) { tp('mg','⚡ PRO MODE UNLOCKED'); tp('mg','full agent collective · all signals live'); }
    else { tp('rd',`✗ PRO requires 1,000,000 $H00D`); tp('rd',`  have ${hoodBal.toLocaleString()} · need ${(1000000-hoodBal).toLocaleString()} more`); tp('yl','  press 2 to buy on pump.fun'); }
    return;
  }
  if (c==='status'||c==='1') {
    tp('dm','fetching...');
    try {
      const d=await(await fetch(`${API}/status`)).json();
      tp('dm','──────────────────────');
      tp(d.running?'gr':'dm',`agents   ${d.running?'● LIVE':'○ offline'}`);
      tp('yl',`balance  $${d.balance}`);
      tp(d.total_pnl>=0?'gr':'rd',`pnl      ${d.total_pnl>=0?'+':''}$${d.total_pnl}`);
      tp('cy',`trades   ${d.trades}`);
      tp('dm','──────────────────────');
    } catch(e) { tp('rd','error: '+e.message); }
    return;
  }
  if (c==='market'||c==='2') { tp('dm','fetching...'); try{const d=await(await fetch(`${API}/market/sol`)).json();tp('cy',d.text);}catch(e){tp('rd','error: '+e.message);} return; }
  if (c==='trending'||c==='3') { tp('dm','fetching...'); try{const d=await(await fetch(`${API}/market/trending`)).json();tp('cy',d.text);}catch(e){tp('rd','error: '+e.message);} return; }
  if (c==='pump'||c==='4') { tp('dm','fetching...'); try{const d=await(await fetch(`${API}/market/pump`)).json();tp('cy',d.text);}catch(e){tp('rd','error: '+e.message);} return; }
  if (c==='trades'||c==='5') {
    tp('dm','fetching...');
    try {
      const d=await(await fetch(`${API}/trade/history`)).json();
      if (!d.history?.length) { tp('dm','no trades yet'); return; }
      d.history.slice(0,10).forEach(t=>tp(t.pnl>=0?'gr':'rd',`${t.symbol}  ${t.pnl>=0?'+':''}$${t.pnl}  ${(t.ts||'').slice(0,16)}`));
    } catch(e) { tp('rd','error: '+e.message); }
    return;
  }
  if (c==='wallet'||c==='6') {
    tp('dm','checking...');
    try { const d=await(await fetch(`${API}/wallet/${wallet}`)).json(); tp('yl',`${wallet.slice(0,6)}...${wallet.slice(-4)}  ${d.sol} SOL`); }
    catch(e) { tp('rd','error: '+e.message); }
    return;
  }
  tp('dm','thinking...');
  try {
    const r=await fetch(`${API}/chat`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:raw,wallet})});
    const d=await r.json();
    tp('mg',`BR0THER › ${d.reply||'...'}`);
  } catch(e) { tp('rd','unavailable — try: help, status, market'); }
}

loadConfig();
</script>
</body>
</html>
