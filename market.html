  :root{ --bg:#181a24; --green:#4fe6a0; --txt:#eef1f5; --txt2:#aab2c0;

  .lnk:hover{color:#eef1f5}

  .tabs{display:flex;gap:1.5rem;margin-bottom:1.2rem}

  .tab.on{color:var(--green);border-bottom:1px solid var(--green)}

  .fld{margin-bottom:1rem}
  .label{font-size:13px;color:var(--g4);letter-spacing:3px;margin-bottom:6px}

       font-size:20px;letter-spacing:3px;padding:12px;cursor:pointer;margin-top:.4rem}
  .cta:hover:not(:disabled){border-color:var(--green);background:rgba(79,230,160,.05);color:#eef1f5}

  a{color:var(--green)}

  .boot{color:var(--g4);font-size:16px;text-align:center;padding:3rem 0;letter-spacing:2px;line-height:1.7}
  .empty{color:var(--g4);font-size:15px;text-align:center;padding:1.5rem 0;letter-spacing:1px}
  .banner{font-size:13px;letter-spacing:1px;color:var(--orange);border:1px solid #4a3a22;
          background:rgba(224,160,64,.04);padding:8px 12px;margin-bottom:1.1rem;text-align:center}

<script type="importmap">
{ "imports": {
  "@solana/web3.js": "https://esm.sh/@solana/web3.js@1.98.0",
  "buffer": "https://esm.sh/buffer@6.0.3"
}}

<script type="module">
import { Buffer } from 'buffer';
globalThis.Buffer = globalThis.Buffer || Buffer;
import { Connection, PublicKey, Transaction, TransactionInstruction, SystemProgram, ComputeBudgetProgram } from '@solana/web3.js';
import {
  TOKEN_PROGRAM_ID, ASSOCIATED_TOKEN_PROGRAM_ID,
  getAssociatedTokenAddressSync, createAssociatedTokenAccountInstruction
} from 'https://esm.sh/@solana/spl-token@0.4.8?external=@solana/web3.js,buffer';

// ── config ───────────────────────────────────────────────────────────────
const RPC = 'https://mainnet.helius-rpc.com/?api-key=09fb7d5a-50cb-4b0a-8f9d-db40d1986eb4';
// After you deploy h00d_market, paste its program id + your fee wallet here.
// Empty PROGRAM_ID = the market shows "opening soon" and stays inert.
const PROGRAM_ID_STR   = '';   // ← paste your deployed program id here to go live
const FEE_RECIPIENT_STR = '3S4VNaMUDBjbD9AkwGztmis9QUfyXfweYyzim4Vy3Y5f';   // must equal FEE_RECIPIENT in the program

const LIVE = PROGRAM_ID_STR.length >= 32;
const PROGRAM_ID    = LIVE ? new PublicKey(PROGRAM_ID_STR) : null;
const FEE_RECIPIENT = FEE_RECIPIENT_STR ? new PublicKey(FEE_RECIPIENT_STR) : null;
const SYSVAR_RENT   = new PublicKey('SysvarRent111111111111111111111111111111111');
const PRIORITY_FEE_MICROLAMPORTS = 100_000; // priority fee per compute unit so txs land when mainnet is busy

// ── login gate ──────────────────────────────────────────────────────────
const REQUIRE_LOGIN = true;
const SB_PROJECT_REF = 'vbkeiyrrujxmavvhtbve';
function isLoggedIn(){
  if(!REQUIRE_LOGIN) return true;
  try{ const t = JSON.parse(localStorage.getItem('sb-'+SB_PROJECT_REF+'-auth-token'));
       const exp = t?.expires_at || t?.currentSession?.expires_at;
       if(exp && exp*1000 < Date.now()) return false;
       return !!(t?.access_token || t?.currentSession?.access_token); }
  catch(e){ return false; }
}

const connection = new Connection(RPC, 'confirmed');
const $ = id => document.getElementById(id);
const msg = (t,c)=>{ const m=$('msg'); m.className='msg '+(c||'dim'); m.innerHTML=t; };
let wallet = null, mint = null, decimals = 9, floorLamports = 0n;

// ── encoding helpers ──────────────────────────────────────────────────────
const enc = s => new TextEncoder().encode(s);
function u64le(v){ const b=new Uint8Array(8); let n=BigInt(v); for(let i=0;i<8;i++){ b[i]=Number(n & 0xffn); n>>=8n; } return b; }
function readU64(buf,off){ let v=0n; for(let i=0;i<8;i++) v += BigInt(buf[off+i]) << (8n*BigInt(i)); return v; }
async function disc(name){
  const h = new Uint8Array(await crypto.subtle.digest('SHA-256', enc('global:'+name)));
  return h.slice(0,8);
}
function cat(...arrs){ let n=0; arrs.forEach(a=>n+=a.length); const o=new Uint8Array(n); let i=0; arrs.forEach(a=>{o.set(a,i);i+=a.length;}); return o; }

// price-per-coin (SOL) <-> price-per-base-unit (lamports), the program's unit
function toPerUnit(priceSol){ return BigInt(Math.floor(priceSol * 1e9 / (10 ** decimals))); }
function toPerCoin(perUnit){ return Number(perUnit) * (10 ** decimals) / 1e9; }

// ── PDAs ──────────────────────────────────────────────────────────────────
const floorPda  = m => PublicKey.findProgramAddressSync([enc('floor'), m.toBytes()], PROGRAM_ID)[0];
const listingPda= (m,seller,seed) => PublicKey.findProgramAddressSync(
  [enc('listing'), m.toBytes(), seller.toBytes(), u64le(seed)], PROGRAM_ID)[0];
const escrowAta = listing => getAssociatedTokenAddressSync(mint, listing, true);

// ── wallet ──────────────────────────────────────────────────────────────
function provider(){
  return (window.phantom?.solana?.isPhantom && window.phantom.solana)
      || (window.solana?.isPhantom && window.solana)
      || (window.solflare?.isSolflare && window.solflare) || null;
}
$('connect').onclick = async () => {
  const p = provider();
  if(!p) return msg('no wallet found — install <a href="https://phantom.app" target="_blank">phantom</a>','red');
  try{ const r = await p.connect(); wallet = p;
    const pk=(r.publicKey||p.publicKey).toString();
    $('connect').textContent = pk.slice(0,4)+'…'+pk.slice(-4); msg('wallet connected','green');
  }catch(e){ msg('connection cancelled','dim'); }
};
async function send(ix){
  const tx = new Transaction().add(
    ComputeBudgetProgram.setComputeUnitPrice({ microLamports: PRIORITY_FEE_MICROLAMPORTS }),
    ...ix
  );
  tx.feePayer = new PublicKey(wallet.publicKey.toString());
  const { blockhash, lastValidBlockHeight } = await connection.getLatestBlockhash();
  tx.recentBlockhash = blockhash;
  const { signature } = await wallet.signAndSendTransaction(tx);
  await connection.confirmTransaction({ signature, blockhash, lastValidBlockHeight }, 'confirmed');
  return signature;
}

// ── load a token: decimals + floor + listings ─────────────────────────────
async function loadToken(){
  const v = $('mint').value.trim();
  try{ mint = new PublicKey(v); }catch(e){ mint=null; $('floorVal').textContent='—'; return; }
  try{ const s = await connection.getTokenSupply(mint); decimals = s.value.decimals; }catch(e){ decimals = 9; }
  await loadFloor(); await loadListings(); await loadMine();
}
async function loadFloor(){
  floorLamports = 0n;
  try{
    const acc = await connection.getAccountInfo(floorPda(mint));
    if(acc && acc.data.length >= 48) floorLamports = readU64(acc.data, 40); // 8 disc +32 mint
  }catch(e){}
  $('floorVal').textContent = floorLamports>0n ? toPerCoin(floorLamports).toLocaleString(undefined,{maximumFractionDigits:9}) : '0';
}
async function fetchListings(extraSellerFilter){
  // Listing layout: 8 disc | 32 seller | 32 mint | 8 amount | 8 price | 8 seed | 1 bump
  const filters = [{ dataSize: 97 }, { memcmp: { offset: 40, bytes: mint.toBase58() } }];
  if(extraSellerFilter) filters.push({ memcmp:{ offset: 8, bytes: extraSellerFilter.toBase58() } });
  const accs = await connection.getProgramAccounts(PROGRAM_ID, { filters });
  return accs.map(a => {
    const d = a.account.data;
    return {
      pubkey: a.pubkey,
      seller: new PublicKey(d.slice(8,40)),
      amount: readU64(d,72),
      price:  readU64(d,80),
      seed:   readU64(d,88),
    };
  }).sort((x,y)=> (x.price<y.price?-1:x.price>y.price?1:0));
}
async function loadListings(){
  const box = $('listings'); box.innerHTML = '<div class="empty">loading…</div>';
  try{
    const list = await fetchListings(null);
    if(!list.length){ box.innerHTML = '<div class="empty">no listings — be the first to sell</div>'; return; }
    box.innerHTML = '';
    for(const l of list){
      const coins = Number(l.amount)/(10**decimals);
      const px = toPerCoin(l.price);
      const row = document.createElement('div'); row.className='listing';
      row.innerHTML = `<span class="px">${px.toLocaleString(undefined,{maximumFractionDigits:9})} ◎</span>`
        + `<span class="amt">× ${coins.toLocaleString(undefined,{maximumFractionDigits:4})}</span>`
        + `<span class="who">${l.seller.toBase58().slice(0,4)}…</span>`
        + `<button class="buy">buy</button>`;
      row.querySelector('.buy').onclick = () => buyListing(l);
      box.appendChild(row);
    }
  }catch(e){ box.innerHTML = `<div class="empty red">${e.message||e}</div>`; }
}
async function loadMine(){
  const box = $('myListings'); if(!wallet){ box.innerHTML='<div class="empty">connect wallet</div>'; return; }
  box.innerHTML = '<div class="empty">loading…</div>';
  try{
    const me = new PublicKey(wallet.publicKey.toString());
    const list = await fetchListings(me);
    if(!list.length){ box.innerHTML = '<div class="empty">none yet</div>'; return; }
    box.innerHTML = '';
    for(const l of list){
      const coins = Number(l.amount)/(10**decimals);
      const row = document.createElement('div'); row.className='listing';
      row.innerHTML = `<span class="px">${toPerCoin(l.price).toLocaleString(undefined,{maximumFractionDigits:9})} ◎</span>`
        + `<span class="amt">× ${coins.toLocaleString(undefined,{maximumFractionDigits:4})}</span>`
        + `<button class="buy cancel" style="margin-left:auto">cancel</button>`;
      row.querySelector('.cancel').onclick = () => cancelListing(l);
      box.appendChild(row);
    }
  }catch(e){ box.innerHTML = `<div class="empty red">${e.message||e}</div>`; }
}

// ── actions ────────────────────────────────────────────────────────────────
async function listForSale(){
  if(PREVIEW) return msg('preview only — deploy the program to enable real listings','dim');
  if(!wallet) return msg('connect your wallet first','red');
  if(!mint)   return msg('paste a token mint','red');
  if(!FEE_RECIPIENT) return msg('market not configured (fee wallet)','red');
  const amtCoins = parseFloat($('sAmt').value), priceSol = parseFloat($('sPrice').value);
  if(!(amtCoins>0)) return msg('enter an amount','red');
  if(!(priceSol>0)) return msg('enter a price','red');
  const perUnit = toPerUnit(priceSol);
  if(perUnit <= 0n) return msg('price too low for this token’s supply','red');
  if(floorLamports>0n && perUnit < floorLamports) return msg('below the floor — raise your price','red');

  $('listBtn').disabled = true;
  try{
    const me = new PublicKey(wallet.publicKey.toString());
    const seed = BigInt(Date.now()); // unique per listing
    const listing = listingPda(mint, me, seed);
    const escrow  = escrowAta(listing);
    const sellerToken = getAssociatedTokenAddressSync(mint, me);
    const amount = BigInt(Math.floor(amtCoins * (10**decimals)));

    const ix = [];
    // floor account must exist; create it if this is the token's first listing
    const floor = floorPda(mint);
    if(!(await connection.getAccountInfo(floor))){
      ix.push(new TransactionInstruction({ programId: PROGRAM_ID,
        keys:[ {pubkey:me,isSigner:true,isWritable:true},{pubkey:mint,isSigner:false,isWritable:false},
               {pubkey:floor,isSigner:false,isWritable:true},{pubkey:SystemProgram.programId,isSigner:false,isWritable:false} ],
        data: Buffer.from(await disc('init_floor')) }));
    }
    ix.push(new TransactionInstruction({ programId: PROGRAM_ID,
      keys:[
        {pubkey:me,isSigner:true,isWritable:true},
        {pubkey:mint,isSigner:false,isWritable:false},
        {pubkey:floor,isSigner:false,isWritable:false},
        {pubkey:listing,isSigner:false,isWritable:true},
        {pubkey:escrow,isSigner:false,isWritable:true},
        {pubkey:sellerToken,isSigner:false,isWritable:true},
        {pubkey:TOKEN_PROGRAM_ID,isSigner:false,isWritable:false},
        {pubkey:ASSOCIATED_TOKEN_PROGRAM_ID,isSigner:false,isWritable:false},
        {pubkey:SystemProgram.programId,isSigner:false,isWritable:false},
      ],
      data: Buffer.from(cat(await disc('create_listing'), u64le(seed), u64le(amount), u64le(perUnit))) }));

    msg('approve in your wallet…','cy');
    const sig = await send(ix);
    msg(`✅ listed — <a href="https://solscan.io/tx/${sig}" target="_blank">view ↗</a>`,'green');
    $('sAmt').value=''; $('sPrice').value='';
    await loadFloor(); await loadListings(); await loadMine();
  }catch(e){ msg('listing failed: '+(e.message||e),'red'); }
  $('listBtn').disabled = false;
}

async function buyListing(l){
  if(!wallet) return msg('connect your wallet first','red');
  if(!FEE_RECIPIENT) return msg('market not configured (fee wallet)','red');
  try{
    const me = new PublicKey(wallet.publicKey.toString());
    const listing = l.pubkey, escrow = escrowAta(listing);
    const buyerToken = getAssociatedTokenAddressSync(mint, me);
    const ix = [];
    if(!(await connection.getAccountInfo(buyerToken)))
      ix.push(createAssociatedTokenAccountInstruction(me, buyerToken, me, mint));
    ix.push(new TransactionInstruction({ programId: PROGRAM_ID,
      keys:[
        {pubkey:me,isSigner:true,isWritable:true},
        {pubkey:l.seller,isSigner:false,isWritable:true},
        {pubkey:listing,isSigner:false,isWritable:true},
        {pubkey:floorPda(mint),isSigner:false,isWritable:true},
        {pubkey:escrow,isSigner:false,isWritable:true},
        {pubkey:buyerToken,isSigner:false,isWritable:true},
        {pubkey:mint,isSigner:false,isWritable:false},
        {pubkey:FEE_RECIPIENT,isSigner:false,isWritable:true},
        {pubkey:TOKEN_PROGRAM_ID,isSigner:false,isWritable:false},
        {pubkey:SystemProgram.programId,isSigner:false,isWritable:false},
      ],
      data: Buffer.from(await disc('buy_listing')) }));
    msg('approve in your wallet…','cy');
    const sig = await send(ix);
    msg(`✅ bought — <a href="https://solscan.io/tx/${sig}" target="_blank">view ↗</a>`,'green');
    await loadFloor(); await loadListings(); await loadMine();
  }catch(e){ msg('buy failed: '+(e.message||e),'red'); }
}

async function cancelListing(l){
  try{
    const me = new PublicKey(wallet.publicKey.toString());
    const listing = l.pubkey, escrow = escrowAta(listing);
    const sellerToken = getAssociatedTokenAddressSync(mint, me);
    const ix = [ new TransactionInstruction({ programId: PROGRAM_ID,
      keys:[
        {pubkey:me,isSigner:true,isWritable:true},
        {pubkey:listing,isSigner:false,isWritable:true},
        {pubkey:escrow,isSigner:false,isWritable:true},
        {pubkey:sellerToken,isSigner:false,isWritable:true},
        {pubkey:mint,isSigner:false,isWritable:false},
        {pubkey:TOKEN_PROGRAM_ID,isSigner:false,isWritable:false},
        {pubkey:SystemProgram.programId,isSigner:false,isWritable:false},
      ],
      data: Buffer.from(await disc('cancel_listing')) }) ];
    msg('approve in your wallet…','cy');
    const sig = await send(ix);
    msg(`✅ cancelled — <a href="https://solscan.io/tx/${sig}" target="_blank">view ↗</a>`,'green');
    await loadListings(); await loadMine();
  }catch(e){ msg('cancel failed: '+(e.message||e),'red'); }
}

// ── tabs + boot ────────────────────────────────────────────────────────────
$('tabBuy').onclick = () => { $('tabBuy').classList.add('on'); $('tabSell').classList.remove('on');
  $('buyView').style.display=''; $('sellView').style.display='none'; };
$('tabSell').onclick = () => { $('tabSell').classList.add('on'); $('tabBuy').classList.remove('on');
  $('sellView').style.display=''; $('buyView').style.display='none'; if(mint && !PREVIEW) loadMine(); };
$('listBtn').onclick = listForSale;
let mintT=null;
$('mint').addEventListener('input', ()=>{ clearTimeout(mintT); mintT=setTimeout(loadToken,400); });

const PREVIEW = !LIVE;   // no program yet → show a styled demo so you can see the UI

function applyGate(){
  const ok = isLoggedIn();
  const boot = $('boot'); if(boot){ boot.dataset.live='1'; boot.style.display='none'; }
  $('locked').style.display = ok ? 'none' : '';
  if(!ok){ $('body').style.display='none'; $('soon').style.display='none'; $('connect').style.display='none'; return; }
  $('connect').style.display = '';
  $('soon').style.display = 'none';
  $('body').style.display = '';
  if(PREVIEW) renderPreview();
}

// demo data so the market's look can be reviewed before the program is deployed
function renderPreview(){
  $('banner').style.display = '';
  $('mint').value = 'DemoCoin…hood (preview)';
  $('mint').disabled = true;
  $('floorVal').textContent = '0.000042';
  const demo = [
    {px:0.000042, amt:1250000, who:'7Qp2'},
    {px:0.000051, amt:840000,  who:'9aZ4'},
    {px:0.000063, amt:520000,  who:'Kx81'},
    {px:0.000080, amt:300000,  who:'b3Rm'},
  ];
  const box = $('listings'); box.innerHTML='';
  for(const l of demo){
    const row=document.createElement('div'); row.className='listing';
    row.innerHTML = `<span class="px">${l.px.toFixed(6)} ◎</span>`
      + `<span class="amt">× ${l.amt.toLocaleString()}</span>`
      + `<span class="who">${l.who}…</span><button class="buy">buy</button>`;
    row.querySelector('.buy').onclick=()=>msg('preview only — market goes live once the program is deployed','dim');
    box.appendChild(row);
  }
  $('myListings').innerHTML='<div class="empty">your listings appear here</div>';
}
applyGate();
window.addEventListener('storage', e => { if(e.key && e.key.includes(SB_PROJECT_REF)) applyGate(); });
window.addEventListener('load', () => {
  const p = provider();
  if(p?.isConnected && p.publicKey){ wallet=p; const pk=p.publicKey.toString();
    $('connect').textContent = pk.slice(0,4)+'…'+pk.slice(-4); }
});
</script>
