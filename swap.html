<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>BR0THER-H00D · Swap</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
<!--
  Non-custodial Jupiter swap for h00d.fun. Visitors connect their OWN wallet
  and sign in-browser — this page and its host never hold a private key.
  Self-contained: no build step. Features: token search w/ logos + prices,
  buy & sell (flip), balance + MAX, slippage control, USD values, honeypot
  pre-check, auto-refreshing quotes, and a login gate (Supabase session).
-->
<style>
  /* h00d.fun theme — VT323 CRT terminal, matrix green, sharp corners */
  :root{ --bg:#0d0d0d; --panel:#0f120f; --line:#1e1e1e; --line2:#1e3a1e; --green:#33ff33;
         --txt:#fff; --txt2:#ccc; --dim:#555; --red:#ff4444; --orange:#e0a040; --cy:#00bcd4;
         --green2:#2a7a2a; --mono:'VT323',monospace; }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--green);font:20px/1.35 var(--mono);
       display:flex;min-height:100vh;min-height:100dvh;align-items:center;justify-content:center;padding:20px}
  .card{width:100%;max-width:440px;background:var(--bg);border:1px solid var(--line2);padding:22px;position:relative}
  .row{display:flex;justify-content:space-between;align-items:center;gap:10px}
  h1{font-size:30px;margin:0;letter-spacing:2px;color:var(--green);text-shadow:0 0 8px rgba(51,255,51,.4)}
  h1 span{color:var(--green2)}
  .sub{color:var(--dim);font-size:15px;margin:2px 0 0;letter-spacing:1px}
  button{font:inherit;border:0;cursor:pointer;background:transparent;color:var(--green);letter-spacing:2px}
  .wallet{border:1px solid var(--line2);color:var(--green2);font-size:16px;padding:8px 12px;text-transform:uppercase}
  .wallet:hover{color:var(--green);border-color:var(--green)}

  .pane{border:1px solid var(--line);padding:12px;margin-top:14px;background:var(--panel)}
  .pane .top{display:flex;justify-content:space-between;color:var(--dim);font-size:15px;letter-spacing:1px}
  .pane .mid{display:flex;justify-content:space-between;align-items:center;gap:8px;margin-top:4px}
  .amt{flex:1;background:transparent;border:0;color:var(--txt);font:inherit;font-size:30px;outline:none;width:100%;caret-color:var(--green)}
  .amt::placeholder{color:#2a2a2a}
  .usd{color:var(--dim);font-size:15px;margin-top:2px}
  .max{border:1px solid var(--line2);color:var(--green2);font-size:13px;padding:2px 8px;letter-spacing:1px}
  .max:hover{color:var(--green);border-color:var(--green)}

  .tokbtn{display:flex;align-items:center;gap:8px;border:1px solid var(--line2);padding:6px 10px;color:var(--txt);font-size:20px;white-space:nowrap}
  .tokbtn:hover{border-color:var(--green)}
  .tokbtn img{width:22px;height:22px;border-radius:50%;background:#222}
  .tokbtn .car{color:var(--dim);font-size:16px}

  .flip{display:flex;justify-content:center;margin:-8px 0 -8px}
  .flip button{border:1px solid var(--line2);width:34px;height:34px;border-radius:50%;color:var(--green);font-size:18px;background:var(--bg)}
  .flip button:hover{border-color:var(--green);box-shadow:0 0 10px rgba(51,255,51,.3)}

  .slip{display:flex;align-items:center;gap:6px;margin-top:14px;font-size:16px;color:var(--dim);letter-spacing:1px;flex-wrap:wrap}
  .slip .chip{border:1px solid var(--line);padding:3px 10px;color:var(--txt2)}
  .slip .chip.on{border-color:var(--green);color:var(--green)}
  .slip input{width:54px;background:transparent;border:1px solid var(--line);color:var(--txt);font:inherit;font-size:16px;padding:3px 6px;outline:none;text-align:center}

  .quote{border:1px solid var(--line);padding:12px;margin-top:14px;font-size:17px;display:none}
  .quote .line{display:flex;justify-content:space-between;margin:3px 0}
  .quote .k{color:var(--dim)}
  .cta{width:100%;margin-top:16px;border:1px solid var(--green);color:var(--green);padding:13px;text-transform:uppercase;letter-spacing:3px;font-size:22px}
  .cta:hover:not(:disabled){background:var(--green);color:var(--bg);box-shadow:0 0 18px rgba(51,255,51,.35)}
  .cta:disabled{opacity:.3;cursor:not-allowed}
  .msg{margin-top:12px;font-size:17px;min-height:20px;letter-spacing:1px}
  .green{color:var(--green)} .red{color:var(--red)} .orange{color:var(--orange)} .cy{color:var(--cy)} .dim{color:var(--dim)}
  a{color:var(--cy)}
  .foot{margin-top:14px;color:var(--dim);font-size:14px;text-align:center;letter-spacing:1px}

  /* token search dropdown */
  .search{position:absolute;left:0;right:0;top:0;bottom:0;background:var(--bg);border:1px solid var(--green2);padding:14px;display:none;flex-direction:column;z-index:5}
  .search input{width:100%;background:var(--panel);border:1px solid var(--line);color:var(--txt);font:inherit;font-size:20px;padding:10px;outline:none;caret-color:var(--green)}
  .results{margin-top:10px;overflow:auto;flex:1}
  .res{display:flex;align-items:center;gap:10px;padding:8px;border-bottom:1px solid var(--line);cursor:pointer}
  .res:hover{background:var(--panel)}
  .res img{width:28px;height:28px;border-radius:50%;background:#222}
  .res .sym{color:var(--txt);font-size:19px}
  .res .nm{color:var(--dim);font-size:14px}
  .res .px{margin-left:auto;text-align:right}
  .res .px .p{color:var(--green);font-size:16px}
  .res .px .lq{color:var(--dim);font-size:13px}
  .closeX{position:absolute;right:12px;top:10px;color:var(--dim);font-size:20px}

  .locked{display:none;margin-top:18px;padding:16px;border:1px solid var(--line2);color:var(--txt2);font-size:18px;letter-spacing:1px;text-align:center}
  .locked a{color:var(--green)}
</style>
</head>
<body>
<div class="card">
  <div class="row">
    <div>
      <h1>BR0THER<span>·</span>H00D</h1>
      <div class="sub">non-custodial swap · powered by jupiter</div>
    </div>
    <button id="connect" class="wallet" style="display:none">Connect</button>
  </div>

  <div id="locked" class="locked">🔒 members only — <a href="/">log in on h00d.fun</a> to swap</div>

  <div id="swapBody" style="display:none">
    <!-- YOU PAY -->
    <div class="pane">
      <div class="top"><span>You pay</span><span id="payBal" class="dim"></span></div>
      <div class="mid">
        <input id="amount" class="amt" type="number" min="0" step="any" placeholder="0.0" inputmode="decimal">
        <button id="payTok" class="tokbtn"><span id="payTokSym">SOL</span></button>
      </div>
      <div class="row"><span id="payUsd" class="usd"></span><button id="maxBtn" class="max" style="display:none">MAX</button></div>
    </div>

    <div class="flip"><button id="flipBtn" title="flip direction">⇅</button></div>

    <!-- YOU RECEIVE -->
    <div class="pane">
      <div class="top"><span>You receive (est.)</span><span id="recBal" class="dim"></span></div>
      <div class="mid">
        <input id="recv" class="amt" type="text" placeholder="0.0" readonly>
        <button id="recTok" class="tokbtn"><img id="recTokImg" style="display:none"><span id="recTokSym">Select</span><span class="car">▾</span></button>
      </div>
      <div class="usd" id="recUsd"></div>
    </div>

    <!-- slippage -->
    <div class="slip">
      <span>slippage</span>
      <span class="chip" data-bps="50">0.5%</span>
      <span class="chip on" data-bps="100">1%</span>
      <span class="chip" data-bps="200">2%</span>
      <input id="slipCustom" type="number" min="0" max="50" step="0.1" placeholder="custom">
    </div>

    <div id="quote" class="quote">
      <div class="line"><span class="k">Rate</span><span id="q_rate">—</span></div>
      <div class="line"><span class="k">Price impact</span><span id="q_impact">—</span></div>
      <div class="line"><span class="k">Min received</span><span id="q_min">—</span></div>
      <div class="line"><span class="k">Safety</span><span id="q_safe">—</span></div>
      <div class="line"><span class="k">Route</span><span id="q_route">—</span></div>
    </div>

    <button id="swapBtn" class="cta" disabled>Connect wallet</button>
    <div id="msg" class="msg dim">Pick a token and an amount.</div>
    <div class="foot" id="refreshNote"></div>
  </div>

  <!-- token search overlay -->
  <div id="search" class="search">
    <span id="searchClose" class="closeX">✕</span>
    <input id="searchInput" placeholder="search name or paste mint…" autocomplete="off">
    <div id="results" class="results"></div>
  </div>
</div>

<script type="module">
import { Connection, VersionedTransaction } from 'https://esm.sh/@solana/web3.js@1.95.8';

// ── config ──────────────────────────────────────────────────────────────
const RPC   = 'https://api.mainnet-beta.solana.com'; // ⚠ replace with a Helius/QuickNode URL for real traffic
const JUP   = 'https://lite-api.jup.ag';
const DEX   = 'https://api.dexscreener.com/latest/dex';
const LOGO  = m => `https://dd.dexscreener.com/ds-data/tokens/solana/${m}.png`;
const SOL_MINT = 'So11111111111111111111111111111111111111112';
const SOL_DEC  = 9;
const MAX_SLIPPAGE_BPS = 5000;
const QUOTE_TTL = 15;   // seconds before auto-refresh

// ── login gate (Supabase session stored by h00d.fun, same-origin) ────────
const REQUIRE_LOGIN  = true;
const SB_PROJECT_REF  = 'vbkeiyrrujxmavvhtbve';
function isLoggedIn(){
  if (!REQUIRE_LOGIN) return true;
  try{
    const raw = localStorage.getItem('sb-'+SB_PROJECT_REF+'-auth-token');
    if(!raw) return false;
    const t = JSON.parse(raw);
    const exp = t?.expires_at || t?.currentSession?.expires_at;
    if(exp && exp*1000 < Date.now()) return false;
    return !!(t?.access_token || t?.currentSession?.access_token);
  }catch(e){ return false; }
}

const connection = new Connection(RPC, 'confirmed');
const $ = id => document.getElementById(id);

// ── state ────────────────────────────────────────────────────────────────
let wallet = null;
let side = 'buy';                 // 'buy' = SOL→token, 'sell' = token→SOL
let token = null;                 // {mint,symbol,name,decimals,logo,priceUsd}
let slippageBps = 100;
let quote = null, solUsd = 0, refreshTimer = null, countdown = 0;
const decCache = { [SOL_MINT]: SOL_DEC };

// ── helpers ──────────────────────────────────────────────────────────────
const looksLikeMint = s => /^[1-9A-HJ-NP-Za-km-z]{32,44}$/.test(s);
const fmt = (n,d=6) => Number(n).toLocaleString(undefined,{maximumFractionDigits:d});
function msg(t,cls){ const m=$('msg'); m.className='msg '+(cls||'dim'); m.innerHTML=t; }

async function rpc(method, params){
  const r = await fetch(RPC,{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({jsonrpc:'2.0',id:1,method,params})});
  return (await r.json()).result;
}
async function getDecimals(mint){
  if(mint in decCache) return decCache[mint];
  try{ const r = await rpc('getTokenSupply',[mint]); decCache[mint]=r.value.decimals; return r.value.decimals; }
  catch(e){ return 9; }
}
async function getSolUsd(){
  try{ const r = await fetch(`${JUP}/swap/v1/quote?inputMint=${SOL_MINT}&outputMint=EPjFWdd5AufqSSqeM2qN1xzybapC8G4wEGGkZwyTDt1v&amount=${10**9}&slippageBps=50`);
       solUsd = Number((await r.json()).outAmount)/1e6; }catch(e){}
}

// ── wallet ───────────────────────────────────────────────────────────────
function provider(){
  return (window.phantom?.solana?.isPhantom && window.phantom.solana)
      || (window.solana?.isPhantom && window.solana)
      || (window.solflare?.isSolflare && window.solflare) || null;
}
$('connect').onclick = async () => {
  const p = provider();
  if(!p) return msg('No wallet found — install <a href="https://phantom.app" target="_blank">Phantom</a>.','red');
  try{
    const res = await p.connect(); wallet = p;
    const pk = (res.publicKey||p.publicKey).toString();
    $('connect').textContent = pk.slice(0,4)+'…'+pk.slice(-4);
    refreshSwapBtn(); refreshBalances(); msg('Wallet connected.','green');
  }catch(e){ msg('Connection cancelled.','dim'); }
};
async function refreshBalances(){
  if(!wallet){ $('payBal').textContent=''; $('recBal').textContent=''; $('maxBtn').style.display='none'; return; }
  const pk = wallet.publicKey.toString();
  const sol = (await rpc('getBalance',[pk]))?.value/1e9 || 0;
  let tokBal = 0;
  if(token){
    try{
      const r = await rpc('getTokenAccountsByOwner',[pk,{mint:token.mint},{encoding:'jsonParsed'}]);
      tokBal = r.value.reduce((s,a)=>s+ (a.account.data.parsed.info.tokenAmount.uiAmount||0),0);
    }catch(e){}
  }
  const solStr = `◎ ${fmt(sol,4)}`;
  const tokStr = token ? `${fmt(tokBal,4)} ${token.symbol}` : '';
  if(side==='buy'){ $('payBal').textContent='bal '+solStr; $('recBal').textContent=token?'bal '+tokStr:''; $('maxBtn').style.display=''; $('maxBtn').dataset.max=Math.max(sol-0.02,0); }
  else            { $('payBal').textContent=token?'bal '+tokStr:''; $('recBal').textContent='bal '+solStr; $('maxBtn').style.display=token?'':'none'; $('maxBtn').dataset.max=tokBal; }
}
$('maxBtn').onclick = () => { $('amount').value = $('maxBtn').dataset.max||0; scheduleQuote(); };

// ── token search ─────────────────────────────────────────────────────────
$('recTok').onclick = openSearch;
$('payTok').onclick = () => { if(side==='sell') openSearch(); };   // pay side is a token only when selling
$('searchClose').onclick = () => $('search').style.display='none';
function openSearch(){ $('search').style.display='flex'; $('searchInput').value=''; $('results').innerHTML=''; $('searchInput').focus(); }

let searchT=null;
$('searchInput').oninput = e => { clearTimeout(searchT); searchT=setTimeout(()=>runSearch(e.target.value.trim()),280); };
async function runSearch(q){
  if(!q){ $('results').innerHTML=''; return; }
  $('results').innerHTML='<div class="dim" style="padding:8px">searching…</div>';
  try{
    const r = await fetch(`${DEX}/search?q=${encodeURIComponent(q)}`);
    const pairs = (await r.json()).pairs||[];
    const byMint = {};
    for(const p of pairs){
      if(p.chainId!=='solana' || !p.baseToken?.address) continue;
      const m = p.baseToken.address, liq=(p.liquidity?.usd||0);
      if(!byMint[m] || liq>byMint[m].liq) byMint[m]={mint:m,symbol:p.baseToken.symbol,name:p.baseToken.name,price:p.priceUsd,liq};
    }
    const list = Object.values(byMint).sort((a,b)=>b.liq-a.liq).slice(0,7);
    if(!list.length){ $('results').innerHTML='<div class="dim" style="padding:8px">no tokens found</div>'; return; }
    $('results').innerHTML='';
    for(const t of list){
      const el=document.createElement('div'); el.className='res';
      el.innerHTML=`<img src="${LOGO(t.mint)}" onerror="this.style.visibility='hidden'">
        <div><div class="sym">${t.symbol||'?'}</div><div class="nm">${(t.name||'').slice(0,24)}</div></div>
        <div class="px"><div class="p">$${t.price?fmt(t.price,6):'—'}</div><div class="lq">liq $${fmt(t.liq,0)}</div></div>`;
      el.onclick=()=>selectToken(t);
      $('results').appendChild(el);
    }
  }catch(e){ $('results').innerHTML='<div class="red" style="padding:8px">search failed</div>'; }
}
async function selectToken(t){
  $('search').style.display='none';
  const decimals = await getDecimals(t.mint);
  token = { mint:t.mint, symbol:t.symbol||t.mint.slice(0,4), name:t.name, decimals, logo:LOGO(t.mint), priceUsd:Number(t.price)||0 };
  renderTokens(); refreshBalances(); scheduleQuote();
}
function renderTokens(){
  const solBtn = `<span>SOL</span>`;
  const tokBtn = token ? `<img src="${token.logo}" onerror="this.style.display='none'"><span>${token.symbol}</span>` : `<span>Select</span><span class="car">▾</span>`;
  if(side==='buy'){ $('payTok').innerHTML=solBtn; $('recTok').innerHTML=tokBtn; }
  else            { $('payTok').innerHTML=tokBtn; $('recTok').innerHTML=solBtn; }
}

// ── flip buy/sell ─────────────────────────────────────────────────────────
$('flipBtn').onclick = () => {
  side = side==='buy'?'sell':'buy';
  $('amount').value=''; $('recv').value=''; $('quote').style.display='none'; quote=null;
  renderTokens(); refreshBalances(); refreshSwapBtn();
  msg(side==='buy'?'Buying with SOL.':'Selling for SOL.','dim');
};

// ── slippage ──────────────────────────────────────────────────────────────
document.querySelectorAll('.slip .chip').forEach(c=>c.onclick=()=>{
  document.querySelectorAll('.slip .chip').forEach(x=>x.classList.remove('on'));
  c.classList.add('on'); slippageBps=Number(c.dataset.bps); $('slipCustom').value=''; scheduleQuote();
});
$('slipCustom').oninput = e => {
  const pct=parseFloat(e.target.value);
  if(pct>0){ document.querySelectorAll('.slip .chip').forEach(x=>x.classList.remove('on'));
    slippageBps=Math.min(Math.round(pct*100),MAX_SLIPPAGE_BPS); scheduleQuote(); }
};

// ── quoting (debounced + auto-refresh) ────────────────────────────────────
$('amount').oninput = scheduleQuote;
let quoteT=null;
function scheduleQuote(){ clearTimeout(quoteT); quoteT=setTimeout(getQuote,350); }

function direction(){
  return side==='buy'
    ? { inMint:SOL_MINT, inDec:SOL_DEC, outMint:token?.mint, outDec:token?.decimals, outSym:token?.symbol }
    : { inMint:token?.mint, inDec:token?.decimals, outMint:SOL_MINT, outDec:SOL_DEC, outSym:'SOL' };
}
async function getQuote(){
  stopRefresh();
  quote=null; $('quote').style.display='none'; $('recv').value=''; refreshSwapBtn();
  const amt=Number($('amount').value); const d=direction();
  if(!token) return msg('Pick a token first.','dim');
  if(!amt||amt<=0) return msg('Enter an amount.','dim');
  msg('Fetching quote…','dim');

  const amountRaw = Math.floor(amt * 10**d.inDec);
  const q = await jupQuote(d.inMint, d.outMint, amountRaw);
  if(q.err) return msg('Quote failed: '+q.err,'red');

  // honeypot pre-check when BUYING (can we sell it back?)
  let safeTxt = '<span class="green">ok</span>';
  if(side==='buy'){
    const back = await jupQuote(d.outMint, d.inMint, q.quote.outAmount);
    if(back.err){ $('quote').style.display='block'; $('q_safe').innerHTML='<span class="red">honeypot — no sell route</span>';
      return msg('⛔ Blocked: this token cannot be sold. Honeypot risk.','red'); }
    const si=Number(back.quote.priceImpactPct||0);
    if(si>0.35) safeTxt=`<span class="orange">high exit impact ${(si*100).toFixed(0)}%</span>`;
  }

  quote=q.quote;
  const out=Number(quote.outAmount)/10**d.outDec;
  const min=Number(quote.otherAmountThreshold)/10**d.outDec;
  const impact=Number(quote.priceImpactPct||0)*100;
  $('recv').value=fmt(out,6);
  $('q_rate').textContent=`1 ${side==='buy'?'SOL':token.symbol} ≈ ${fmt(out/amt,6)} ${d.outSym}`;
  $('q_impact').innerHTML=`<span class="${impact>5?'red':impact>1.5?'orange':'green'}">${impact.toFixed(2)}%</span>`;
  $('q_min').textContent=`${fmt(min,6)} ${d.outSym}`;
  $('q_safe').innerHTML=safeTxt;
  $('q_route').textContent=quote.routePlan.map(r=>r.swapInfo?.label||'?').join(' → ');
  $('quote').style.display='block';
  // USD values
  if(!solUsd) await getSolUsd();
  if(side==='buy'){ $('payUsd').textContent = solUsd?`≈ $${fmt(amt*solUsd,2)}`:''; }
  else { $('payUsd').textContent = token.priceUsd?`≈ $${fmt(amt*token.priceUsd,2)}`:''; }
  refreshSwapBtn(); msg('Quote ready. Review and swap.','green');
  startRefresh();
}
async function jupQuote(inMint,outMint,amountRaw){
  try{
    const r=await fetch(`${JUP}/swap/v1/quote?inputMint=${inMint}&outputMint=${outMint}&amount=${amountRaw}&slippageBps=${Math.min(slippageBps,MAX_SLIPPAGE_BPS)}`);
    const d=await r.json();
    if(d.error) return {err:d.error};
    if(!d.routePlan?.length) return {err:'no route'};
    return {quote:d};
  }catch(e){ return {err:String(e)}; }
}

// auto-refresh the quote so it never goes stale
function startRefresh(){ countdown=QUOTE_TTL; refreshTimer=setInterval(()=>{ countdown--;
  $('refreshNote').textContent=`quote refreshes in ${countdown}s`;
  if(countdown<=0){ stopRefresh(); getQuote(); } },1000); }
function stopRefresh(){ if(refreshTimer){ clearInterval(refreshTimer); refreshTimer=null; } $('refreshNote').textContent=''; }

function refreshSwapBtn(){
  const ready = wallet && quote;
  $('swapBtn').disabled = !ready;
  $('swapBtn').textContent = !wallet ? 'Connect wallet' : (quote ? (side==='buy'?'Buy':'Sell') : 'Get a quote');
}

// ── swap (signed in the user's wallet) ────────────────────────────────────
$('swapBtn').onclick = async () => {
  if(!wallet||!quote) return;
  stopRefresh(); $('swapBtn').disabled=true;
  try{
    msg('Building transaction…','dim');
    const r=await fetch(`${JUP}/swap/v1/swap`,{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({quoteResponse:quote,userPublicKey:wallet.publicKey.toString(),
        wrapAndUnwrapSol:true,dynamicComputeUnitLimit:true,prioritizationFeeLamports:'auto'})});
    const {swapTransaction,error}=await r.json();
    if(error||!swapTransaction) throw new Error(error||'no transaction');
    const tx=VersionedTransaction.deserialize(Uint8Array.from(atob(swapTransaction),c=>c.charCodeAt(0)));
    msg('Approve in your wallet…','cy');
    const {signature}=await wallet.signAndSendTransaction(tx);
    msg('Confirming on-chain…','cy');
    const bh=await connection.getLatestBlockhash();
    await connection.confirmTransaction({signature,...bh},'confirmed');
    msg(`✅ Done. <a href="https://solscan.io/tx/${signature}" target="_blank">View on Solscan ↗</a>`,'green');
    $('amount').value=''; $('recv').value=''; quote=null; $('quote').style.display='none';
    refreshBalances(); refreshSwapBtn();
  }catch(e){ msg('Swap failed: '+(e.message||e),'red'); $('swapBtn').disabled=false; }
};

// ── boot ──────────────────────────────────────────────────────────────────
function applyGate(){
  const ok=isLoggedIn();
  $('swapBody').style.display=ok?'':'none';
  $('connect').style.display=ok?'':'none';
  $('locked').style.display=ok?'none':'';
}
applyGate();
window.addEventListener('storage',e=>{ if(e.key&&e.key.includes(SB_PROJECT_REF)) applyGate(); });
window.addEventListener('load',()=>{ const p=provider();
  if(p?.isConnected&&p.publicKey){ wallet=p; const pk=p.publicKey.toString();
    $('connect').textContent=pk.slice(0,4)+'…'+pk.slice(-4); refreshSwapBtn(); refreshBalances(); }
  getSolUsd(); renderTokens();
